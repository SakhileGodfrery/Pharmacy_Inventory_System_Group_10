<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy Inventory System</title>
    <!-- Bootstrap 5 + Icons + Chart.js -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        .sidebar {
            background-color: #1e2a3e;
            min-height: 100vh;
            color: #cfdde6;
        }
        .sidebar a {
            color: #cfdde6;
            text-decoration: none;
            display: block;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            transition: 0.2s;
        }
        .sidebar a:hover, .sidebar a.active {
            background-color: #2c3e50;
            color: white;
        }
        .sidebar .nav-item {
            margin-bottom: 0.3rem;
        }
        .main-content {
            padding: 20px;
        }
        .card-stats {
            border: none;
            border-radius: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            transition: 0.2s;
        }
        .card-stats:hover {
            transform: translateY(-3px);
        }
        .stat-icon {
            font-size: 2.2rem;
            opacity: 0.7;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
        }
        footer {
            background-color: white;
            border-top: 1px solid #dee2e6;
            padding: 1rem 0;
            margin-top: 2rem;
        }
        @media (max-width: 768px) {
            .sidebar {
                min-height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container-fluid px-0">
        <div class="row g-0">
            <!-- Sidebar -->
            <div class="col-md-2 col-lg-2 sidebar p-3">
                <h4 class="text-white mb-4"><i class="fas fa-capsules me-2"></i>PharmaStock</h4>
                <div class="nav flex-column">
                    <div class="nav-item"><a href="{% url 'dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a></div>
                    <div class="nav-item"><a href="{% url 'product_list' %}"><i class="fas fa-boxes me-2"></i> Products</a></div>
                    <div class="nav-item"><a href="{% url 'batch_list' %}"><i class="fas fa-layer-group me-2"></i> Batches</a></div>
                    <div class="nav-item"><a href="{% url 'reorder_report' %}"><i class="fas fa-shopping-cart me-2"></i> Reorder</a></div>
                    <div class="nav-item"><a href="{% url 'query2' %}"><i class="fas fa-chart-line me-2"></i> Sales Report</a></div>
                </div>
                <hr class="bg-secondary">
                <div class="small text-secondary mt-4">
                    <i class="fas fa-database me-1"></i> Raw SQL
                </div>
            </div>

            <!-- Main content -->
            <div class="col-md-10 col-lg-10 main-content">
                {% block content %}{% endblock %}
                <footer class="text-center text-muted small">
                    &copy; 2026 Pharmacy Inventory System – Raw SQL / PostgreSQL
                </footer>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
