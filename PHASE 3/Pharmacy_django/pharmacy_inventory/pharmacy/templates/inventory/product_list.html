{% extends 'inventory/base.html' %}
{% block content %}
<h2>Products</h2>
<table class="table table-striped">
    <thead><tr><th>ID</th><th>Name</th><th>Category</th><th>Price</th><th>Supplier</th></tr></thead>
    <tbody>
        {% for p in products %}
        <tr>
            <td>{{ p.product_id }}</td>
            <td>{{ p.product_name }}</td>
            <td>{{ p.category }}</td>
            <td>${{ p.price }}</td>
            <td>{{ p.supplier_name }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
